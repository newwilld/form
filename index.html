<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Briefing de Marca - Formulário Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Estilização suave para inputs */
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Loader de Inicialização -->
    <div id="initial-loader" class="min-h-screen flex items-center justify-center">
        <div class="flex flex-col items-center space-y-4">
            <div class="loader" style="width: 40px; height: 40px;"></div>
            <p class="text-gray-500 text-sm animate-pulse">Sincronizando com o servidor...</p>
        </div>
    </div>

    <!-- Visão do Cliente -->
    <main id="client-view" class="hidden max-w-2xl mx-auto p-4 py-8 relative min-h-screen">
        <div id="form-container" class="bg-white rounded-2xl shadow-lg p-6 sm:p-8 mt-4 border border-gray-100">
            <div class="mb-8 text-center">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Briefing de Marca</h1>
                <p class="text-gray-500">Ajude-nos a entender a sua visão para criarmos algo incrível.</p>
            </div>

            <form id="briefing-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nome do Cliente</label>
                        <div class="relative">
                            <i class="fa-solid fa-user absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                            <input type="text" id="nomeCliente" required class="pl-10 w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition-all" placeholder="Seu nome completo">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nome da Marca</label>
                        <div class="relative">
                            <i class="fa-solid fa-briefcase absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                            <input type="text" id="nomeMarca" required class="pl-10 w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition-all" placeholder="Ex: Studio Alpha">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email de Contacto</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                        <input type="email" id="email" required class="pl-10 w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition-all" placeholder="seuemail@exemplo.com">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Segmento / Área de Atuação</label>
                    <input type="text" id="nicho" required class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition-all" placeholder="Ex: Moda, Gastronomia, Tecnologia...">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Cores de Preferência</label>
                    <input type="text" id="cores" required class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition-all" placeholder="Ex: Tons pastéis, preto e dourado...">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">Elementos Visuais Desejados</label>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 border-gray-200">
                            <input type="checkbox" name="objetos" value="Tipográfico (Letras)" class="w-4 h-4 text-blue-600 rounded">
                            <span class="ml-3 text-sm text-gray-700">Tipográfico (Letras)</span>
                        </label>
                        <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 border-gray-200">
                            <input type="checkbox" name="objetos" value="Ícone Minimalista" class="w-4 h-4 text-blue-600 rounded">
                            <span class="ml-3 text-sm text-gray-700">Ícone Minimalista</span>
                        </label>
                        <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 border-gray-200">
                            <input type="checkbox" name="objetos" value="Símbolo Geométrico" class="w-4 h-4 text-blue-600 rounded">
                            <span class="ml-3 text-sm text-gray-700">Símbolo Geométrico</span>
                        </label>
                        <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 border-gray-200">
                            <input type="checkbox" name="objetos" value="Ilustração Orgânica" class="w-4 h-4 text-blue-600 rounded">
                            <span class="ml-3 text-sm text-gray-700">Ilustração Orgânica</span>
                        </label>
                        <div class="flex flex-col p-3 border rounded-lg border-gray-200" id="outro-container">
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" id="check-outro" class="w-4 h-4 text-blue-600 rounded">
                                <span class="ml-3 text-sm text-gray-700">Outro elemento...</span>
                            </label>
                            <input type="text" id="outro-texto" class="hidden mt-2 ml-7 border-b border-gray-300 outline-none text-sm py-1 bg-transparent" placeholder="Descreva aqui...">
                        </div>
                    </div>
                </div>

                <button type="submit" id="btn-submit" class="w-full flex items-center justify-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-semibold transition-all shadow-lg hover:shadow-blue-200 active:scale-[0.99]">
                    <i class="fa-solid fa-paper-plane mr-2"></i> Enviar Briefing
                </button>
            </form>
        </div>

        <!-- Mensagem de Sucesso -->
        <div id="success-msg" class="hidden bg-white p-10 rounded-2xl shadow-xl text-center mt-20 border border-green-50">
            <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-check text-4xl"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-gray-800">Enviado com Sucesso!</h2>
            <p class="text-gray-600 mb-8 leading-relaxed">As suas informações foram registadas. Entraremos em contacto brevemente para dar seguimento ao seu projeto.</p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-medium hover:bg-blue-700 transition-all">Enviar outra resposta</button>
        </div>

        <!-- Botão Admin Oculto -->
        <button onclick="toggleAdminView()" class="fixed bottom-4 right-4 text-gray-200 hover:text-gray-400 p-2 transition-colors focus:outline-none" title="Painel Admin">
            <i class="fa-solid fa-lock"></i>
        </button>
    </main>

    <!-- Visão Administrativa -->
    <main id="admin-view" class="hidden max-w-6xl mx-auto p-4 py-8">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8">
            <div>
                <button onclick="toggleAdminView()" class="text-gray-400 hover:text-gray-700 text-sm font-medium mb-2 inline-flex items-center transition-colors">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Voltar ao Formulário
                </button>
                <h1 class="text-3xl font-bold text-gray-800 flex items-center">
                    <i class="fa-solid fa-clipboard-list mr-3 text-blue-600"></i> Respostas Recebidas
                </h1>
            </div>
            <div id="total-badge" class="mt-4 sm:mt-0 bg-blue-50 text-blue-700 px-4 py-2 rounded-full font-bold border border-blue-100 shadow-sm">
                A carregar...
            </div>
        </div>

        <div id="admin-loader" class="flex justify-center py-20">
            <div class="loader"></div>
        </div>

        <div id="responses-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- As respostas aparecerão aqui -->
        </div>
    </main>

    <!-- Scripts do Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Configuração do seu Projeto
        const firebaseConfig = {
            apiKey: "AIzaSyC3lMDr8wv2sbyKrQ_g_QbwF-La-iBcj2s",
            authDomain: "form-61cb3.firebaseapp.com",
            projectId: "form-61cb3",
            storageBucket: "form-61cb3.firebasestorage.app",
            messagingSenderId: "856018845836",
            appId: "1:856018845836:web:aca36b5d63287a45afbba9",
            measurementId: "G-EKPPTKSHH7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const APP_ID = 'form-61cb3';

        let currentUser = null;
        let isAdminView = false;

        const initialLoader = document.getElementById('initial-loader');
        const clientView = document.getElementById('client-view');
        const adminView = document.getElementById('admin-view');
        const form = document.getElementById('briefing-form');
        const checkOutro = document.getElementById('check-outro');
        const outroTexto = document.getElementById('outro-texto');

        // Monitorar estado de autenticação
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                initialLoader.classList.add('hidden');
                clientView.classList.remove('hidden');
                console.log("Sessão ativa:", user.uid);
            } else {
                // Tenta entrar anonimamente se não houver user
                signInAnonymously(auth).catch(err => {
                    console.error("Erro crítico de autenticação:", err);
                    alert("Erro ao conectar com o servidor. Por favor, tente novamente mais tarde.");
                });
            }
        });

        // Lógica do Checkbox de texto extra
        checkOutro.addEventListener('change', (e) => {
            outroTexto.classList.toggle('hidden', !e.target.checked);
            if (e.target.checked) outroTexto.focus();
        });

        // Submissão do Formulário
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<div class="loader" style="width: 20px; height: 20px; border-width: 2px;"></div>';

            try {
                const objetosChecked = Array.from(document.querySelectorAll('input[name="objetos"]:checked')).map(el => el.value);
                if (checkOutro.checked && outroTexto.value.trim()) {
                    objetosChecked.push(`Personalizado: ${outroTexto.value}`);
                }

                const payload = {
                    nomeCliente: document.getElementById('nomeCliente').value,
                    nomeMarca: document.getElementById('nomeMarca').value,
                    email: document.getElementById('email').value,
                    nicho: document.getElementById('nicho').value,
                    cores: document.getElementById('cores').value,
                    objetos: objetosChecked,
                    userId: currentUser.uid,
                    createdAt: serverTimestamp()
                };

                // Guardar no caminho oficial
                const path = collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'respostas');
                await addDoc(path, payload);

                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            } catch (err) {
                console.error("Erro ao guardar dados:", err);
                alert("Erro ao enviar o briefing. Por favor, verifique a sua ligação.");
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-2"></i> Enviar Briefing';
            }
        });

        // Navegação para o Admin
        window.toggleAdminView = () => {
            isAdminView = !isAdminView;
            if (isAdminView) {
                clientView.classList.add('hidden');
                adminView.classList.remove('hidden');
                loadAdminData();
            } else {
                adminView.classList.add('hidden');
                clientView.classList.remove('hidden');
            }
        };

        // Carregamento de Respostas em Tempo Real
        function loadAdminData() {
            if (!currentUser) return;
            
            const grid = document.getElementById('responses-grid');
            const totalBadge = document.getElementById('total-badge');
            const loader = document.getElementById('admin-loader');
            
            loader.classList.remove('hidden');
            grid.innerHTML = '';

            const path = collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'respostas');
            
            // Ouvinte em tempo real
            onSnapshot(path, (snapshot) => {
                loader.classList.add('hidden');
                const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Ordenação manual (mais recentes primeiro)
                docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                
                totalBadge.innerText = `Total: ${docs.length} Briefings`;
                
                if (docs.length === 0) {
                    grid.innerHTML = `<div class="col-span-full py-20 text-center bg-white rounded-2xl border border-dashed border-gray-200 text-gray-400 font-medium">Ainda não recebeu nenhuma resposta.</div>`;
                    return;
                }

                grid.innerHTML = docs.map(resp => {
                    const dataFormatada = resp.createdAt?.seconds 
                        ? new Date(resp.createdAt.seconds * 1000).toLocaleDateString('pt-PT') 
                        : 'Agora';

                    return `
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-shadow relative overflow-hidden group">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-600 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-xl font-bold text-gray-800 leading-tight">${resp.nomeMarca || 'Marca Indefinida'}</h3>
                                    <p class="text-gray-500 text-sm mt-1 flex items-center">
                                        <i class="fa-solid fa-user-circle mr-1.5"></i> ${resp.nomeCliente || 'Desconhecido'}
                                    </p>
                                </div>
                                <span class="bg-gray-50 text-gray-400 text-[10px] uppercase font-bold px-2 py-1 rounded border border-gray-100">
                                    ${dataFormatada}
                                </span>
                            </div>

                            <div class="grid grid-cols-2 gap-4 mb-5 text-sm">
                                <div class="bg-gray-50 p-2 rounded">
                                    <span class="block text-[10px] text-gray-400 font-bold uppercase mb-1">Nicho</span>
                                    <span class="text-gray-700 font-medium truncate block">${resp.nicho}</span>
                                </div>
                                <div class="bg-gray-50 p-2 rounded">
                                    <span class="block text-[10px] text-gray-400 font-bold uppercase mb-1">Email</span>
                                    <span class="text-gray-700 font-medium truncate block" title="${resp.email}">${resp.email}</span>
                                </div>
                            </div>

                            <div class="mb-4">
                                <span class="block text-[10px] text-gray-400 font-bold uppercase mb-2">Preferências de Cores</span>
                                <p class="text-sm text-gray-600 bg-blue-50/30 p-2 rounded border border-blue-50/50 italic">"${resp.cores}"</p>
                            </div>

                            <div class="pt-4 border-t border-gray-50">
                                <span class="block text-[10px] text-gray-400 font-bold uppercase mb-2">Elementos</span>
                                <div class="flex flex-wrap gap-1.5">
                                    ${resp.objetos && resp.objetos.length > 0 
                                        ? resp.objetos.map(obj => `<span class="bg-white border border-gray-200 text-gray-600 px-2 py-0.5 rounded text-[11px] font-medium shadow-sm">${obj}</span>`).join('')
                                        : '<span class="text-xs text-gray-300 italic">Sem preferências</span>'
                                    }
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }, (error) => {
                console.error("Erro na escuta de dados:", error);
                loader.classList.add('hidden');
                grid.innerHTML = `<div class="col-span-full p-4 bg-red-50 text-red-600 rounded-lg text-sm text-center">Erro de permissão. Certifique-se de que as regras do Firestore permitem a leitura para o seu UID.</div>`;
            });
        }
    </script>
</body>
</html>
